# appliances.yaml — single source of truth for appliance categories, types, and controls.
#
# Adding a new category:  add an entry under `appliances`.
# Adding a new type:       add an entry under `types` inside an appliance.
# Adding a new control:    list the control type string; if it is not a built-in
#                          (speed | mode | timer | lighting | power), register a
#                          ControlWidgetBuilder in ControlRegistry before runApp().
#
# Built-in control types and what they render in the control screen:
#   speed    → CircularSpeedDial (6-speed radial dial)
#   mode     → ModeControlWidget + boost button (nature / reverse / smart / boost)
#   timer    → TimerControlWidget  (off / 2h / 4h / 8h)
#   lighting → LightingControlWidget (on/off, warm/neutral/cool, brightness)
#   power    → reserved for non-fan appliances (simple on/off toggle)
#
# modelPrefix  - 2-letter prefix; model IDs are auto-generated as TN-<PREFIX>-01…21
# modelCount   - number of models to generate (default 21 if omitted)

version: 1

appliances:

  # ── Fans ────────────────────────────────────────────────────────────────────

  - id: fans
    displayName: Fans
    pluralLabel: Fans
    icon: assets/icons/Ceiling fan.png

    types:

      - id: ceiling_fan
        displayName: Ceiling Fan
        modelPrefix: CF
        icon: assets/icons/Ceiling fan.png
        modelCount: 21
        controls:
          - speed
          - mode
          - timer
          - lighting

      - id: table_fan
        displayName: Table Fan
        modelPrefix: TF
        icon: assets/icons/Table fan.png
        modelCount: 21
        controls:
          - speed
          - mode
          - timer

      - id: pedestal_fan
        displayName: Pedestal Fan
        modelPrefix: PF
        icon: assets/icons/Pedestal fan.png
        modelCount: 21
        controls:
          - speed
          - mode
          - timer

      - id: wall_fan
        displayName: Wall Fan
        modelPrefix: WF
        icon: assets/icons/Wall fan.png
        modelCount: 21
        controls:
          - speed
          - mode
          - timer

      - id: exhaust_fan
        displayName: Exhaust Fan
        modelPrefix: EF
        icon: assets/icons/Exhaust fan.png
        modelCount: 21
        controls:
          - speed
          - timer

  # ── Water Filtration ────────────────────────────────────────────────────────

  - id: water_filtration
    displayName: Water Filtration
    pluralLabel: Water Filters
    icon: assets/icons/water_filtration.png   # icon pending — add PNG to assets/icons/
    comingSoon: true                          # types route to the Coming Soon page, not pairing

    types:

      - id: ro_filter
        displayName: RO
        modelPrefix: RO
        icon: assets/icons/ro_filter.png      # icon pending
        modelCount: 10
        controls:
          - water_quality

      - id: uf_uv_filter
        displayName: UF+UV
        modelPrefix: UV
        icon: assets/icons/uf_uv_filter.png   # icon pending
        modelCount: 10
        controls:
          - water_quality

  # ── Air Purification ─────────────────────────────────────────────────────────

  - id: air_purification
    displayName: Air Purification
    pluralLabel: Air Purifiers
    icon: assets/icons/air_purification.png   # icon pending
    comingSoon: true                          # types route to the Coming Soon page, not pairing

    types:

      - id: aqm_monitor
        displayName: AQM
        modelPrefix: AQ
        icon: assets/icons/aqm_monitor.png    # icon pending
        modelCount: 10
        controls:
          - air_quality

      - id: air_purifier
        displayName: Air Purifier
        modelPrefix: AP
        icon: assets/icons/air_purifier.png   # icon pending
        modelCount: 10
        controls:
          - air_quality

  # ── Energy / Storage ─────────────────────────────────────────────────────────

  - id: energy_storage
    displayName: Energy / Storage
    pluralLabel: Energy Devices
    icon: assets/icons/energy_storage.png     # icon pending
    comingSoon: true                          # types route to the Coming Soon page, not pairing

    types:

      - id: solar
        displayName: Solar
        modelPrefix: SL
        icon: assets/icons/Energy.png
        modelCount: 10
        controls:
          - energy_metrics

      - id: battery_storage
        displayName: Storage
        modelPrefix: BA
        icon: assets/icons/Battery.png
        modelCount: 10
        controls:
          - energy_metrics

      - id: power_conversion
        displayName: Power Conversion
        modelPrefix: PC
        icon: assets/icons/power_conversion.png  # icon pending
        modelCount: 10
        controls:
          - energy_metrics

  # ── Example: add a new category below and the app reflects it automatically ──
