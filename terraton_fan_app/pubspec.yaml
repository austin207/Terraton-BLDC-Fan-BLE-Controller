name: terraton_fan_app
description: "Terraton BLDC Fan BLE Controller"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # BLE
  flutter_blue_plus: ^2.2.1

  # QR scanner
  mobile_scanner: ^6.0.4

  # YAML parsing
  yaml: ^3.1.3

  # Local DB
  objectbox: ^4.0.3
  objectbox_flutter_libs: ^4.0.3

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.1

  # File sharing / import
  share_plus: ^10.1.2
  file_picker: ^8.1.6

  # Runtime permissions
  permission_handler: ^11.3.1

  path_provider: ^2.1.5
  path: ^1.9.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  objectbox_generator: ^4.0.3
  build_runner: ^2.4.0
  flutter_lints: ^5.0.0
  mocktail: ^1.0.5

flutter:
  uses-material-design: true
  assets:
    - assets/commands.yaml
