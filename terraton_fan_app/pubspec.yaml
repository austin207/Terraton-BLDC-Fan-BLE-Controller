name: terraton_fan_app
description: "Terraton BLDC Fan BLE Controller"
publish_to: 'none'
version: 3.0.5+35

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # BLE
  flutter_blue_plus: ^2.2.1

  # QR scanner
  mobile_scanner: ^6.0.4

  # YAML parsing
  yaml: ^3.1.3

  # Local DB
  objectbox: ^4.0.3
  objectbox_flutter_libs: ^4.0.3

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.1

  # File sharing / import
  share_plus: ^10.1.2
  file_picker: ^8.1.6

  # Runtime permissions
  permission_handler: ^11.3.1

  package_info_plus: ^8.3.0
  path_provider: ^2.1.5
  path: ^1.9.1
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  qr_flutter: ^4.1.0

  # Data upload for AI training
  http: ^1.2.2
  crypto: ^3.0.3
  connectivity_plus: ^6.0.3

  # OTA updates - opens downloaded APK in Android system installer
  open_file: ^3.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  objectbox_generator: ^4.0.3
  build_runner: ^2.4.0
  flutter_lints: ^5.0.0
  mocktail: ^1.0.5
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/commands.yaml
    - assets/appliances.yaml
    - assets/appliances_client.yaml
    - assets/icon/
    - assets/icons/
    - assets/logos/
    - assets/fonts/Manrope-Regular.ttf
    - assets/fonts/Manrope-SemiBold.ttf
    - assets/fonts/Manrope-Bold.ttf
    - assets/fonts/Manrope-ExtraBold.ttf

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
