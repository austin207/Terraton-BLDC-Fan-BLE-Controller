name: Release

# Runs on every push to main. Analyze + test first; build + publish APK only if
# both pass. Produces a rolling "latest" GitHub Release with three APK splits.
#
# Required GitHub Secrets
# ───────────────────────
# UPLOAD_API_KEY    — Cloudflare Worker Bearer token (set via GitHub Secrets)
# KEYSTORE_BASE64   — base64-encoded release keystore (see setup below)
# STORE_PASSWORD    — keystore store password
# KEY_ALIAS         — key alias inside the keystore (e.g. "terraton")
# KEY_PASSWORD      — key password
#
# One-time keystore setup (run locally, then add secrets to GitHub)
# ─────────────────────────────────────────────────────────────────
# keytool -genkey -v -keystore terraton-release.jks \
#   -keyalg RSA -keysize 2048 -validity 10000 -alias terraton
# base64 -w 0 terraton-release.jks   # paste output → KEYSTORE_BASE64 secret
# Keep terraton-release.jks somewhere safe offline — you need it to re-sign.

on:
  push:
    branches: [main]

jobs:
  # ── 1. Gate: all tests must pass before we build ───────────────────────────
  test:
    name: Analyze + Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraton_fan_app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter analyze --no-fatal-infos
      - run: flutter test --reporter github

  # ── 2. Build signed APKs and publish ──────────────────────────────────────
  release:
    name: Build + Publish
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('terraton_fan_app/android/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Install dependencies
        working-directory: terraton_fan_app
        run: flutter pub get

      - name: Generate code
        working-directory: terraton_fan_app
        run: dart run build_runner build --delete-conflicting-outputs

      # Decode the release keystore from the GitHub Secret.
      # Written to RUNNER_TEMP (outside the repo tree) to avoid accidental staging.
      # Falls back to Android debug signing if secret is absent (local forks).
      - name: Decode keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d \
            > $RUNNER_TEMP/release.keystore

      - name: Build split APKs
        working-directory: terraton_fan_app
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          flutter build apk --release --split-per-abi \
            --dart-define="UPLOAD_API_KEY=${{ secrets.UPLOAD_API_KEY }}"

      - name: Collect APKs
        id: apks
        run: |
          APK_DIR=terraton_fan_app/build/app/outputs/flutter-apk
          TS=$(date +%Y%m%d_%H%M%S)
          COMMIT=${GITHUB_SHA::7}

          mkdir -p dist
          cp $APK_DIR/app-arm64-v8a-release.apk  dist/terraton-arm64-${TS}-${COMMIT}.apk
          cp $APK_DIR/app-armeabi-v7a-release.apk dist/terraton-arm7-${TS}-${COMMIT}.apk  2>/dev/null || true
          cp $APK_DIR/app-x86_64-release.apk      dist/terraton-x86_64-${TS}-${COMMIT}.apk 2>/dev/null || true

          echo "arm64=dist/terraton-arm64-${TS}-${COMMIT}.apk"   >> $GITHUB_OUTPUT
          echo "timestamp=$TS"                                     >> $GITHUB_OUTPUT
          echo "commit=$COMMIT"                                    >> $GITHUB_OUTPUT

      # Rolling "latest" release — delete old tag and recreate.
      - name: Publish to GitHub Releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TIMESTAMP="${{ steps.apks.outputs.timestamp }}"
          COMMIT="${{ steps.apks.outputs.commit }}"
          BUILD_DATE=$(date '+%Y-%m-%d %H:%M UTC')

          gh release delete latest --repo ${{ github.repository }} --yes 2>/dev/null || true
          git push origin --delete latest 2>/dev/null || true

          gh release create latest dist/*.apk \
            --repo ${{ github.repository }} \
            --title "Latest Build (${BUILD_DATE})" \
            --notes "$(cat <<EOF
          Built from commit ${COMMIT} on ${BUILD_DATE}.

          | APK | Architecture | Use for |
          |-----|-------------|---------|
          | terraton-arm64-*.apk  | arm64-v8a   | All modern Android phones (recommended) |
          | terraton-arm7-*.apk   | armeabi-v7a | Older 32-bit Android phones |
          | terraton-x86_64-*.apk | x86_64      | Android emulators |
          EOF
          )" \
            --latest
