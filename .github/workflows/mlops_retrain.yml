name: MLOps — Retrain

# Runs every Sunday at 01:00 UTC or on manual trigger.
# Phase 1 (XGBoost) runs whenever there are 500+ rows.
# Phase 2 (Keras → TFLite) runs when there are 10,000+ rows.
# On a successful Phase 2, the new model is uploaded to R2 and
# models/latest.json is updated — the app OTAs it automatically.
#
# Required GitHub Secrets
# ───────────────────────
# R2_ACCOUNT_ID         — Cloudflare account ID (32-char hex, from dashboard sidebar)
# R2_ACCESS_KEY_ID      — R2 API token Access Key ID  (R2 → Manage R2 API Tokens)
# R2_SECRET_ACCESS_KEY  — R2 API token Secret Access Key

on:
  schedule:
    - cron: '0 1 * * 0'   # 01:00 UTC every Sunday
  workflow_dispatch:
    inputs:
      phase:
        description: 'Max phase to run (1=XGBoost only, 2=XGBoost+TFLite)'
        default: '2'
        required: false
        type: choice
        options: ['1', '2']
      min_rows_override:
        description: 'Override minimum row count (0 = use defaults)'
        default: '0'
        required: false

env:
  R2_ENDPOINT:   https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
  R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY_ID }}
  R2_SECRET_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  R2_BUCKET:     terraton-usage-data

jobs:
  retrain:
    name: Check data → Train → Upload
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: ml/requirements.txt

      - name: Install Python dependencies
        run: pip install -r ml/requirements.txt

      # ── Data health check ────────────────────────────────────────────────
      - name: Check R2 data volume
        id: data
        env:
          R2_ENDPOINT:   ${{ env.R2_ENDPOINT }}
          R2_ACCESS_KEY: ${{ env.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ env.R2_SECRET_KEY }}
        run: |
          python ml/data_health.py --json --no-exit > data_health.json
          cat data_health.json
          ROWS=$(python -c "import json; print(json.load(open('data_health.json'))['total_rows'])")
          echo "rows=$ROWS" >> $GITHUB_OUTPUT
          echo "Total rows: $ROWS"

      - name: Skip if insufficient data
        if: steps.data.outputs.rows < 500
        run: |
          echo "Only ${{ steps.data.outputs.rows }} rows — need 500 for Phase 1. Skipping."
          exit 0

      # ── Phase 1: XGBoost ─────────────────────────────────────────────────
      - name: Phase 1 — XGBoost baseline
        env:
          R2_ENDPOINT:   ${{ env.R2_ENDPOINT }}
          R2_ACCESS_KEY: ${{ env.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ env.R2_SECRET_KEY }}
        run: python ml/train.py --phase 1

      - name: Upload Phase 1 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: phase1-${{ github.run_number }}
          path: |
            ml/output/gear_xgb.json
            ml/output/savings_xgb.json
            ml/output/shap_importance.png
          retention-days: 30

      # ── Phase 2: Keras → TFLite (10k+ rows only) ────────────────────────
      - name: Phase 2 — Two-tower Keras + TFLite
        if: |
          steps.data.outputs.rows >= 10000 &&
          (github.event.inputs.phase == '' || github.event.inputs.phase == '2')
        env:
          R2_ENDPOINT:   ${{ env.R2_ENDPOINT }}
          R2_ACCESS_KEY: ${{ env.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ env.R2_SECRET_KEY }}
        run: python ml/train.py --phase 2

      - name: Upload Phase 2 artifacts
        if: steps.data.outputs.rows >= 10000
        uses: actions/upload-artifact@v4
        with:
          name: phase2-${{ github.run_number }}
          path: |
            ml/output/terraton_recommender_fp16.tflite
            ml/output/normalization_config.json
            ml/output/terraton_recommender.keras
          retention-days: 90

      # ── Push new model to R2 (OTA delivery) ─────────────────────────────
      - name: Upload model to R2 + update latest.json
        if: steps.data.outputs.rows >= 10000
        env:
          R2_ENDPOINT:   ${{ env.R2_ENDPOINT }}
          R2_ACCESS_KEY: ${{ env.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ env.R2_SECRET_KEY }}
        run: python ml/upload_model.py

      - name: Summary
        run: |
          echo "### MLOps Retrain Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Rows in R2: **${{ steps.data.outputs.rows }}**" >> $GITHUB_STEP_SUMMARY
          echo "- Phase 1 (XGBoost): ✅ complete" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ steps.data.outputs.rows }}" -ge 10000 ]]; then
            echo "- Phase 2 (TFLite): ✅ complete — model pushed to R2" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Phase 2 (TFLite): ⏳ waiting for 10,000+ rows" >> $GITHUB_STEP_SUMMARY
          fi
